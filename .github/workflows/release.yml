name: release

# Fires on version tags (v1.2.3-style). Push a tag to cut a real release:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Needed only for the homebrew_casks step (push to the separate
          # Tehman700/homebrew-liveurl tap repo) — create that repo once,
          # then add a personal access token with repo write access to it
          # as this repo's HOMEBREW_TAP_GITHUB_TOKEN secret.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  npm-publish:
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set package version from tag
        working-directory: npm-wrapper
        run: npm version --no-git-tag-version "${GITHUB_REF_NAME#v}"

      - name: Publish
        working-directory: npm-wrapper
        # The secrets context isn't usable in a job-level `if:`, so the
        # skip check lives here instead: until NPM_TOKEN is set up (see
        # README's distribution section), this logs and exits 0 rather
        # than failing the release for an already-known, expected gap.
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret not set — skipping npm publish."
            exit 0
          fi
          npm publish --access public
        env:
          # Create this on npmjs.com (Access Tokens, "Automation" type) and
          # add it as this repo's NPM_TOKEN secret.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
